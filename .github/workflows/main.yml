name: Rheinpegel aktualisieren

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-rheinpegel:
    runs-on: ubuntu-latest

    steps:
      - name: Repository laden
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Pakete installieren
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas lxml html5lib beautifulsoup4

      - name: Rheinpegel Script ausführen
        run: python Rheinpegel.py

      - name: CSV-Dateien speichern
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add rheinpegel_aktuell.csv rheinpegel_vorhersage.csv
          git commit -m "Automatische Rheinpegel Aktualisierung" || echo "Keine Änderungen"
          git push
